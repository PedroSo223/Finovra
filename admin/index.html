<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin - Finovra</title>
  <link href="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.css" rel="stylesheet" />
</head>
<body>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <script>
    const slugify = (str) => {
      return str
        .toLowerCase()
        .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
        .replace(/[^\w\s-]/g, '')
        .replace(/\s+/g, '-')
        .replace(/--+/g, '-')
        .trim();
    }

    DecapCMS.init({
      config: {
        backend: {
          name: 'git-gateway',
          branch: 'main',
        },
        media_folder: 'public/images/uploads',
        public_folder: '/images/uploads',
        collections: [
          {
            name: 'posts',
            label: 'Posts',
            folder: 'content/posts',
            create: true,
            slug: '{{slug}}',
            fields: [
              { label: 'Título', name: 'title', widget: 'string' },
              { label: 'Slug (URL)', name: 'slug', widget: 'string', required: false, hint: 'Deixe em branco para gerar automaticamente' },
              { label: 'Descrição', name: 'description', widget: 'text' },
              { label: 'Data', name: 'date', widget: 'datetime', date_format: 'YYYY-MM-DD', time_format: false, format: 'YYYY-MM-DD', default: '' },
              { label: 'Imagem de Capa', name: 'image', widget: 'image', required: false },
              { label: 'Conteúdo', name: 'body', widget: 'markdown' }
            ]
          }
        ]
      }
    })
  </script>
</body>
</html>
